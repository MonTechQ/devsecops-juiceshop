name: 📅 Weekly Scheduled Security Scan

on:
  schedule:
    # Every Monday at 03:00 UTC — catches new CVEs against unchanged code
    - cron: "0 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  issues: write  # Auto-create issues for new findings

jobs:
  scheduled-container-scan:
    name: "🐳 Weekly Trivy CVE Refresh"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Pull latest image and re-scan for new CVEs
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "bkimminich/juice-shop:latest"
          format: "json"
          output: "trivy-weekly.json"
          severity: "CRITICAL,HIGH"
          exit-code: "1"

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-trivy-${{ github.run_id }}
          path: trivy-weekly.json

  scheduled-dependency-scan:
    name: "📦 Weekly Dependency CVE Refresh"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: npm install + audit
        run: |
          npm ci --audit=false
          npm audit --audit-level=moderate --json > npm-weekly.json || true

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-npm-audit-${{ github.run_id }}
          path: npm-weekly.json

  create-issue-on-failure:
    name: "📬 Open Issue on New Findings"
    runs-on: ubuntu-latest
    needs: [scheduled-container-scan, scheduled-dependency-scan]
    if: failure()
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Issue for new CVEs
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const date = new Date().toISOString().split('T')[0];
            await github.rest.issues.create({
              owner,
              repo,
              title: `🚨 [${date}] New CVEs detected — Weekly Security Scan`,
              body: [
                '## Weekly Security Scan Alert',
                '',
                `**Date:** ${date}`,
                `**Run:** [${context.runId}](${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId})`,
                '',
                '### Action Required',
                '- [ ] Review Trivy container scan results',
                '- [ ] Review npm audit dependency results',
                '- [ ] Update dependencies or apply patches',
                '- [ ] Re-run pipeline to verify gates pass',
                '',
                '> This issue was automatically created by the weekly scheduled scan.',
              ].join('\n'),
              labels: ['security', 'automated', 'cve-alert'],
            });
