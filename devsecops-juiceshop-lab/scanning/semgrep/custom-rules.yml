rules:
  # ───────────────────────────────────────────────────────────────────
  # RULE 1 — SQL Injection via string concatenation
  # CWE-89 | OWASP A03:2021 | WASC-19
  # ───────────────────────────────────────────────────────────────────
  - id: sql-injection-string-concat
    patterns:
      - pattern: |
          $QUERY = "..." + $INPUT
      - pattern-not: |
          $QUERY = "..." + $SAFE.escape($INPUT)
    message: >
      Potential SQL injection: string concatenation used to build a SQL query.
      Use parameterized queries or prepared statements instead.
      CWE-89 | OWASP A03:2021
    languages: [javascript, typescript]
    severity: ERROR
    metadata:
      cwe: "CWE-89: Improper Neutralization of Special Elements in SQL Commands"
      owasp: "A03:2021 - Injection"
      wasc: "WASC-19: SQL Injection"
      references:
        - https://owasp.org/www-community/attacks/SQL_Injection

  # ───────────────────────────────────────────────────────────────────
  # RULE 2 — Hardcoded credentials or secrets in source
  # CWE-798 | OWASP A07:2021 | WASC-13
  # ───────────────────────────────────────────────────────────────────
  - id: hardcoded-secret-variable
    patterns:
      - pattern: |
          const $KEY = "$SECRET"
      - metavariable-regex:
          metavariable: $KEY
          regex: >-
            (?i)(password|passwd|pwd|secret|api[_-]?key|apikey|
            token|auth[_-]?token|jwt[_-]?secret|private[_-]?key|
            access[_-]?key|client[_-]?secret)
      - metavariable-regex:
          metavariable: $SECRET
          regex: ".{8,}"  # Non-trivial length
    message: >
      Hardcoded secret detected in variable '$KEY'.
      Move secrets to environment variables or a secret manager.
      CWE-798 | OWASP A07:2021
    languages: [javascript, typescript]
    severity: ERROR
    metadata:
      cwe: "CWE-798: Use of Hard-coded Credentials"
      owasp: "A07:2021 - Identification and Authentication Failures"
      fix: "Use process.env.SECRET_NAME and inject via CI/CD secrets"

  - id: hardcoded-secret-let-var
    pattern-either:
      - pattern: |
          let $KEY = "$SECRET"
      - pattern: |
          var $KEY = "$SECRET"
    patterns:
      - metavariable-regex:
          metavariable: $KEY
          regex: >-
            (?i)(password|passwd|secret|api[_-]?key|token|jwt)
      - metavariable-regex:
          metavariable: $SECRET
          regex: ".{8,}"
    message: >
      Hardcoded secret in variable '$KEY' (let/var).
      CWE-798 | OWASP A07:2021
    languages: [javascript, typescript]
    severity: ERROR
    metadata:
      cwe: "CWE-798"
      owasp: "A07:2021"

  # ───────────────────────────────────────────────────────────────────
  # RULE 3 — Insecure JWT verification (none algorithm / no verify)
  # CWE-347 | OWASP A07:2021
  # ───────────────────────────────────────────────────────────────────
  - id: jwt-verify-disabled
    pattern-either:
      - pattern: |
          jwt.verify($TOKEN, $SECRET, {algorithms: ["none"]}, ...)
      - pattern: |
          jwt.decode($TOKEN, {complete: true})
      - pattern: |
          jwt.verify($TOKEN, ..., {ignoreExpiration: true}, ...)
    message: >
      Insecure JWT handling detected: algorithm 'none' or unverified decode.
      Always verify JWT signature and expiration.
      CWE-347 | OWASP A07:2021
    languages: [javascript, typescript]
    severity: ERROR
    metadata:
      cwe: "CWE-347: Improper Verification of Cryptographic Signature"
      owasp: "A07:2021 - Identification and Authentication Failures"

  # ───────────────────────────────────────────────────────────────────
  # RULE 4 — eval() with user-controlled input
  # CWE-94 | OWASP A03:2021
  # ───────────────────────────────────────────────────────────────────
  - id: eval-user-input
    patterns:
      - pattern: |
          eval($INPUT)
      - pattern-not: |
          eval("...")   # Static string eval is lower risk
    message: >
      eval() called with non-literal argument — potential code injection.
      Never pass user-controlled data to eval().
      CWE-94 | OWASP A03:2021
    languages: [javascript, typescript]
    severity: ERROR
    metadata:
      cwe: "CWE-94: Improper Control of Code Generation"
      owasp: "A03:2021 - Injection"

  # ───────────────────────────────────────────────────────────────────
  # RULE 5 — Path traversal via unsanitized join
  # CWE-22 | OWASP A01:2021
  # ───────────────────────────────────────────────────────────────────
  - id: path-traversal-join
    patterns:
      - pattern: |
          path.join($BASE, $USERCONTROLLED)
      - pattern-not: |
          path.join($BASE, path.basename($USERCONTROLLED))
    message: >
      path.join() with user-controlled input — potential path traversal.
      Validate the resolved path starts with the expected base directory.
      CWE-22 | OWASP A01:2021
    languages: [javascript, typescript]
    severity: WARNING
    metadata:
      cwe: "CWE-22: Improper Limitation of a Pathname to a Restricted Directory"
      owasp: "A01:2021 - Broken Access Control"
      fix: |
        const resolved = path.resolve(BASE_DIR, userInput);
        if (!resolved.startsWith(path.resolve(BASE_DIR))) throw new Error('Traversal attempt');

  # ───────────────────────────────────────────────────────────────────
  # RULE 6 — Missing authorization check before data access
  # CWE-284 | OWASP A01:2021
  # ───────────────────────────────────────────────────────────────────
  - id: idor-missing-auth-check
    patterns:
      - pattern: |
          models.$MODEL.findOne({where: {id: $REQ.params.$PARAM}})
      - pattern-not: |
          models.$MODEL.findOne({where: {id: $REQ.params.$PARAM, UserId: $REQ.user.id}})
    message: >
      Possible IDOR: database lookup by ID without user ownership check.
      Ensure the queried record belongs to the authenticated user.
      CWE-284 | OWASP A01:2021
    languages: [javascript, typescript]
    severity: WARNING
    metadata:
      cwe: "CWE-284: Improper Access Control"
      owasp: "A01:2021 - Broken Access Control"
      wasc: "WASC-02: Insufficient Authorization"

  # ───────────────────────────────────────────────────────────────────
  # RULE 7 — XSS via innerHTML
  # CWE-79 | OWASP A03:2021
  # ───────────────────────────────────────────────────────────────────
  - id: xss-innerhtml
    patterns:
      - pattern: |
          $ELEMENT.innerHTML = $INPUT
      - pattern-not: |
          $ELEMENT.innerHTML = $SAFE.sanitize($INPUT)
      - pattern-not: |
          $ELEMENT.innerHTML = "..."
    message: >
      innerHTML assignment with non-static, unsanitized input — XSS risk.
      Use textContent for plain text or DOMPurify.sanitize() for HTML.
      CWE-79 | OWASP A03:2021
    languages: [javascript, typescript]
    severity: ERROR
    metadata:
      cwe: "CWE-79: Cross-site Scripting"
      owasp: "A03:2021 - Injection"

  # ───────────────────────────────────────────────────────────────────
  # RULE 8 — Weak cryptographic hash (MD5, SHA1 for passwords)
  # CWE-916 | OWASP A02:2021
  # ───────────────────────────────────────────────────────────────────
  - id: weak-crypto-hash
    pattern-either:
      - pattern: |
          crypto.createHash("md5")
      - pattern: |
          crypto.createHash("sha1")
      - pattern: |
          md5($PASSWORD)
    message: >
      Weak hash algorithm (MD5/SHA1) detected — not suitable for password storage.
      Use bcrypt, argon2, or scrypt for password hashing.
      CWE-916 | OWASP A02:2021
    languages: [javascript, typescript]
    severity: ERROR
    metadata:
      cwe: "CWE-916: Use of Password Hash With Insufficient Computational Effort"
      owasp: "A02:2021 - Cryptographic Failures"

  # ───────────────────────────────────────────────────────────────────
  # RULE 9 — XML parsing without disabling external entities (XXE)
  # CWE-611 | OWASP A05:2021
  # ───────────────────────────────────────────────────────────────────
  - id: xxe-unsafe-xml-parse
    pattern-either:
      - pattern: |
          libxmljs.parseXml($INPUT)
      - pattern: |
          libxmljs.parseXmlString($INPUT)
    message: >
      XML parsed without disabling external entity (XXE) processing.
      Pass {noent: false, noblanks: true} and validate against a schema.
      CWE-611 | OWASP A05:2021
    languages: [javascript, typescript]
    severity: ERROR
    metadata:
      cwe: "CWE-611: Improper Restriction of XML External Entity Reference"
      owasp: "A05:2021 - Security Misconfiguration"
